name: Auto Tag on Push

on:
  push:
    branches:
      - main

permissions:
  contents: write  # Crucial: Permite que el bot cree el tag en tu repo

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para leer el historial completo y los tags existentes

      - name: Configurar Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Crear y subir Tag
        run: |
          # Genera un tag basado en el número de ejecución del workflow
          # Ejemplo: v1.0.5
          TAG_NAME="v1.0.${{ github.run_number }}"
          echo "Creando el tag: $TAG_NAME"
          
          git tag $TAG_NAME
          git push origin $TAG_NAME
