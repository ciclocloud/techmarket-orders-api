apiVersion: apps/v1
kind: Deployment
metadata:
  name: techmarket-orders-green
  labels:
    app: techmarket-orders
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techmarket-orders
      version: green
  template:
    metadata:
      labels:
        app: techmarket-orders
        version: green
    spec:
      containers:
        - name: orders-api
          image: REPOSITORY_URI_PLACEHOLDER:latest
          ports:
            - containerPort: 3000
          # ESTE HEALTH CHECK FALLARÁ INTENCIONALMENTE
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
