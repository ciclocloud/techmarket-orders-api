apiVersion: apps/v1
kind: Deployment
metadata:
  name: techmarket-orders-blue
  labels:
    app: techmarket-orders
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techmarket-orders
      version: blue
  template:
    metadata:
      labels:
        app: techmarket-orders
        version: blue
    spec:
      containers:
        - name: orders-api
          image: REPOSITORY_URI_PLACEHOLDER:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health    # /health volvió a la normalidad
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
